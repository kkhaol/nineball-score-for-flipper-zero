name: Build Nineball Score FAP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Momentum Firmware
        run: |
          git clone --recursive https://github.com/Next-Flip/Momentum-Firmware.git fw

      - name: Copy App
        run: |
          mkdir -p fw/applications_user/nineball_score
          cp -r nineball_score/* fw/applications_user/nineball_score/

      - name: Build FAP
        run: |
          cd fw
          ./fbt launch APPSRC=applications_user/nineball_score || true
          find build -name "*.fap"
          mkdir -p ../artifact
          find build -name "*.fap" -exec cp {} ../artifact/ \;
          test -f ../artifact/nineball_score.fap

      - name: Upload FAP
        uses: actions/upload-artifact@v4
        with:
          name: nineball_score_fap
          path: artifact/nineball_score.fap
